<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dominó de Albarico</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, getDocs, updateDoc, doc, arrayUnion, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA_4QmxxzA2ui9cNSu_2G1i-b2N-QqjdJc",
            authDomain: "domino-a3a5f.firebaseapp.com",
            projectId: "domino-a3a5f",
            storageBucket: "domino-a3a5f.firebasestorage.app",
            messagingSenderId: "764428191568",
            appId: "1:764428191568:web:54f8a9233be5e22a5ece55"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const jugadoresCol = collection(db, "jugadores_albarico");

        let rolActual = "jugador";
        let listaJugadoresMemoria = [];
        let timeoutOrdenamiento = null;
        let bloqueadoPorClic = false;

        window.validarAcceso = () => {
            const u = document.getElementById('user').value.trim().toLowerCase();
            const p = document.getElementById('pass').value.trim();
            if (u === "admin" && p === "12345") { rolActual = "admin"; abrirApp(); }
            else if (u === "jugador" && p === "1234") { rolActual = "jugador"; abrirApp(); }
            else { alert("Usuario o clave incorrectos"); }
        };

        function abrirApp() {
            document.getElementById('login-form').style.display = 'none';
            document.getElementById('app-content').style.display = 'block';
            document.getElementById('rol-badge').innerText = "MODO: " + rolActual.toUpperCase();
            document.getElementById('admin-ui').style.display = (rolActual === "admin") ? 'block' : 'none';
            escucharDatosRealtime();
        }

        window.nuevo = async () => {
            let n = document.getElementById('nom').value.trim();
            if(n) {
                await addDoc(jugadoresCol, { n: n, f: [], t: Date.now() });
                document.getElementById('nom').value = "";
            }
        };

        window.sumarCapote = async (id) => {
            bloqueadoPorClic = true; 
            
            let d = new Date();
            // SOLUCIÓN: Agregamos Date.now() para que ningún clic sea idéntico y Firebase los guarde TODOS
            let codigoUnico = Date.now();
            let fecha = d.getDate() + "/" + (d.getMonth()+1) + "/" + d.getFullYear() + " " + d.getHours() + ":" + (d.getMinutes()<10?'0':'') + d.getMinutes() + " - " + codigoUnico;
            
            const jugador = listaJugadoresMemoria.find(j => j.id === id);
            if (jugador) {
                if (!jugador.f) jugador.f = [];
                jugador.f.push(fecha);
                dibujarSoloNumeros(listaJugadoresMemoria); 
            }

            const ref = doc(db, "jugadores_albarico", id);
            await updateDoc(ref, { f: arrayUnion(fecha) });

            clearTimeout(timeoutOrdenamiento);
            timeoutOrdenamiento = setTimeout(async () => {
                bloqueadoPorClic = false;
                timeoutOrdenamiento = null;
                const snapshot = await getDocs(jugadoresCol);
                let lista = [];
                snapshot.forEach(doc => lista.push({id: doc.id, ...doc.data()}));
                lista.sort((a, b) => (b.f ? b.f.length : 0) - (a.f ? a.f.length : 0));
                listaJugadoresMemoria = lista;
                dibujarCompleto(lista);
            }, 1500);
        };

        window.reseteo = async () => {
            if(confirm("¿Seguro que quieres borrar todas las zapateras del año?")) {
                const querySnapshot = await getDocs(jugadoresCol);
                for (const docSnapshot of querySnapshot.docs) {
                    await deleteDoc(doc(db, "jugadores_albarico", docSnapshot.id));
                }
            }
        };

        function escucharDatosRealtime() {
            onSnapshot(jugadoresCol, (snapshot) => {
                if (bloqueadoPorClic) return; 
                
                let lista = [];
                snapshot.forEach(doc => lista.push({id: doc.id, ...doc.data()}));
                lista.sort((a, b) => (b.f ? b.f.length : 0) - (a.f ? a.f.length : 0));
                listaJugadoresMemoria = lista;
                dibujarCompleto(lista);
            });
        }

        function dibujarSoloNumeros(datos) {
            datos.forEach((j, i) => {
                let total = j.f ? j.f.length : 0;
                let ray = "卌 ".repeat(Math.floor(total/5)) + "|".repeat(total%5) || "Sin capotes";
                
                const contenedorRayitas = document.getElementById(`rayas-${j.id}`);
                if (contenedorRayitas) {
                    contenedorRayitas.innerText = `${ray} (${total})`;
                }
            });
        }

        function dibujarCompleto(datos) {
            let html = "";
            datos.forEach((j, i) => {
                let total = j.f ? j.f.length : 0;
                let ray = "卌 ".repeat(Math.floor(total/5)) + "|".repeat(total%5) || "Sin capotes";
                let botonAdmin = (rolActual === "admin") ? `<button class="btn-capote" onclick="sumarCapote('${j.id}')">+ CAPOTE</button>` : "";

                html += `<div class="card">
                    <div class="flex">
                        <div onclick="document.getElementById('hist-${i}').style.display = (document.getElementById('hist-${i}').style.display === 'block' ? 'none' : 'block')" style="flex-grow:1; cursor:pointer;">
                            <span class="nombre">${j.n}</span>
                            <div class="rayitas" id="rayas-${j.id}">${ray} (${total})</div>
                        </div>
                        ${botonAdmin}
                    </div>
                    <div class="historial" id="hist-${i}">
                        <strong>Días que le metieron las 75:</strong><br>
                        ${total > 0 ? j.f.map(f => "💀 " + f.split(" - ")[0]).join("<br>") : "Limpio por ahora."}
                    </div>
                </div>`;
            });
            document.getElementById('lista').innerHTML = html || "<p style='text-align:center; color:gray;'>No hay víctimas registradas.</p>";
        }
        window.cerrarSesion = () => { location.reload(); };
    </script>

    <style>
        body { background-color: #0d1117; color: white; font-family: sans-serif; margin: 0; padding: 20px; }
        .login-screen { text-align: center; margin-top: 50px; }
        .header { text-align: center; padding: 15px; background: #161b22; border-radius: 12px; margin-bottom: 20px; border: 1px solid #30363d; }
        h1 { color: #f85149; font-size: 1.4rem; margin: 5px 0; text-transform: uppercase; }
        h2 { font-size: 1.1rem; color: #8b949e; margin: 0; font-weight: normal; }
        .fichas-container { font-size: 55px; margin-bottom: 15px; display: flex; justify-content: center; gap: 15px; }
        .card { background: #161b22; border: 1px solid #30363d; border-radius: 10px; padding: 15px; margin-bottom: 12px; }
        .flex { display: flex; justify-content: space-between; align-items: center; }
        .nombre { font-size: 1.2rem; font-weight: bold; color: #58a6ff; text-transform: uppercase; }
        .rayitas { color: #f1e05a; font-size: 1.3rem; letter-spacing: 2px; margin-top: 5px; }
        .btn-capote { background: #da3633; color: white; border: none; padding: 12px 18px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        input { width: 85%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #30363d; background: #161b22; color: white; font-size: 1rem; }
        .btn-entrar { background: #f85149; color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; width: 92%; cursor: pointer; }
        .historial { display: none; font-size: 0.85rem; color: #8b949e; margin-top: 10px; padding: 10px; border-top: 1px dotted #30363d; background: #0d1117; }
        #admin-ui { display: none; background:#1c2128; padding:15px; border-radius:10px; margin-top:20px; border: 1px solid #f85149; }
        #app-content { display: none; }
    </style>
</head>
<body>
    <div id="login-form" class="login-screen">
        <div class="fichas-container"><span>🁔</span><span>🁫</span><span>🁠</span></div>
        <h1>DOMINÓ DE ALBARICO</h1>
        <h2>Registro de Capotes (75-0)</h2><br>
        <input type="text" id="user" placeholder="Usuario">
        <input type="password" id="pass" placeholder="Contraseña">
        <button class="btn-entrar" onclick="validarAcceso()">VER QUIÉN LLEVA MÁS PALO</button>
    </div>

    <div id="app-content">
        <div class="header">
            <div style="font-size: 35px; margin-bottom: 5px;">🁔 🁫 🁠</div>
            <h1>DOMINÓ DE ALBARICO</h1>
            <h2 style="color: #f85149; font-weight: bold;">¿QUIÉN SERÁ EL DUEÑO DE LA ZAPATERÍA ESTE AÑO?</h2>
            <small id="rol-badge" style="color: #8b949e; display: block; margin-top: 10px;"></small>
        </div>

        <div id="lista"></div>

        <div id="admin-ui">
            <h3 style="margin:0 0 10px 0; color: #f85149;">Panel de Control (Dueño)</h3>
            <input type="text" id="nom" placeholder="Nombre del jugador">
            <button onclick="nuevo()" style="background:#21262d; color:white; padding:10px; border-radius:5px; width: 95%; border:1px solid #30363d; font-weight:bold;">AÑADIR JUGADOR</button>
            <button onclick="reseteo()" style="color:#f85149; background:none; border:none; margin-top:20px; width:100%; font-size: 0.7rem;">LIMPIAR TODO EL HISTORIAL</button>
        </div>
        
        <button onclick="cerrarSesion()" style="margin-top:30px; background:none; border:none; color:#8b949e; width:100%; text-decoration: underline;">Cerrar Sesión</button>
    </div>
</body>
</html>
